services:
  api:
    build: ./backend
    container_name: airsoftmap-api
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
