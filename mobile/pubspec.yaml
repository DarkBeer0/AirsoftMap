name: airsoftmap
description: Tactical airsoft tracker — BMS for organizers, intuitive map for players.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Maps (native MapLibre)
  maplibre_gl: ^0.20.0
  latlong2: ^0.9.1

  # QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Geolocation / sensors
  geolocator: ^13.0.1
  flutter_compass: ^0.8.1
  sensors_plus: ^6.0.1
  flutter_foreground_task: ^8.10.0

  # Audio (offline TTS)
  flutter_tts: ^4.2.0

  # Storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Auth + backend
  supabase_flutter: ^2.6.0
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Push
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local HTTP server for MBTiles
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # Utils
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
