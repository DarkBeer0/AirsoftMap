org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compiler падает при разных корнях диска у проекта и pub cache
# (E:\... vs C:\Users\...\Pub\Cache\...). Отключаем — full rebuild каждый раз,
# но сборка проходит без IllegalArgumentException про "different roots".
kotlin.incremental=false

# Иначе R8 при release-сборке может выкинуть нативные части maplibre/sqlite3.
android.enableR8.fullMode=false
